# Render blueprint — deploys the Cairn API. (Railway works too: point it at backend/ and it
# auto-detects Node; set the same env vars.) The frontend deploys separately on Vercel with
# root directory = frontend/ and NEXT_PUBLIC_API_BASE = this service's URL.
services:
  - type: web
    name: cairn-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false # set in the dashboard, never committed
      - key: GEMINI_API_KEY
        sync: false # real semantic embeddings (optional but recommended)
      - key: DATABASE_URL
        sync: false # managed Postgres (Neon/Supabase) so the index survives redeploys
      - key: PERSIST
        value: 'true'
      - key: TRUST_PROXY
        value: 'true'
      - key: CORS_ORIGINS
        value: https://your-frontend.vercel.app # update after the Vercel deploy
